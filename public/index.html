<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API POST - Custom Activity</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="ca-container">
    <!-- Header -->
    <div class="ca-header">
      <div class="ca-header-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
      </div>
      <div>
        <h1>Configurar chamada API</h1>
        <p class="ca-subtitle">Defina o endpoint, headers e payload da requisicao</p>
      </div>
    </div>

    <!-- Endpoint -->
    <div class="ca-card">
      <div class="ca-card-title">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        Endpoint
      </div>
      <div class="ca-endpoint-row">
        <div class="ca-method-wrapper">
          <label>Metodo</label>
          <select id="httpMethod">
            <option value="POST">POST</option>
            <option value="PUT">PUT</option>
            <option value="PATCH">PATCH</option>
          </select>
        </div>
        <div class="ca-url-wrapper">
          <label>URL da API</label>
          <input type="text" id="targetUrl" placeholder="https://api.exemplo.com/endpoint">
        </div>
      </div>
    </div>

    <!-- Headers -->
    <div class="ca-card">
      <div class="ca-card-title">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Headers
        <span class="ca-badge">opcional</span>
      </div>
      <div id="headers-container"></div>
      <button class="ca-btn-add" onclick="addHeader()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Adicionar Header
      </button>
    </div>

    <!-- Body Fields -->
    <div class="ca-card">
      <div class="ca-card-title">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 18 22 12 16 6"/>
          <polyline points="8 6 2 12 8 18"/>
        </svg>
        Campos do Body (JSON)
      </div>

      <div class="ca-fields-header">
        <span class="ca-fh-name">Nome do campo</span>
        <span class="ca-fh-type">Tipo</span>
        <span class="ca-fh-value">Valor</span>
        <span class="ca-fh-action"></span>
      </div>

      <div id="fields-container"></div>

      <button class="ca-btn-add" onclick="addField()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Adicionar Campo
      </button>
    </div>
  </div>

  <script src="js/postmonger.js"></script>
  <script src="js/customActivity.js"></script>
</body>
</html>
