<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API POST - Custom Activity</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="ca-container">
    <div class="ca-header">
      <div class="ca-header-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
      </div>
      <div>
        <h1>Configurar chamada API</h1>
        <p class="ca-subtitle">Defina o endpoint, headers e payload da requisicao</p>
      </div>
    </div>

    <div class="ca-card">
      <div class="ca-card-title">Endpoint</div>
      <div class="ca-endpoint-row">
        <div class="ca-method-wrapper">
          <label>Metodo</label>
          <select id="httpMethod">
            <option value="POST">POST</option>
            <option value="PUT">PUT</option>
            <option value="PATCH">PATCH</option>
          </select>
        </div>
        <div class="ca-url-wrapper">
          <label>URL da API</label>
          <input type="text" id="targetUrl" placeholder="https://api.exemplo.com/endpoint">
        </div>
      </div>
    </div>

    <div class="ca-card">
      <div class="ca-card-title">Headers <span class="ca-badge">opcional</span></div>
      <div id="headers-container"></div>
      <button class="ca-btn-add" onclick="addHeader()">+ Adicionar Header</button>
    </div>

    <div class="ca-card">
      <div class="ca-card-title">Campos do Body (JSON)</div>
      <div class="ca-fields-header">
        <span class="ca-fh-name">Nome do campo</span>
        <span class="ca-fh-type">Tipo</span>
        <span class="ca-fh-value">Valor</span>
        <span class="ca-fh-action"></span>
      </div>
      <div id="fields-container"></div>
      <button class="ca-btn-add" onclick="addField()">+ Adicionar Campo</button>
    </div>
  </div>

  <script src="postmonger.js"></script>
  <script src="customActivity.js"></script>
</body>
</html>
